query GetPageBySlug($slug: String!) {
  entries(collection: "pages", filter: { slug: $slug }, limit: 1) {
    data {
      id
      title
      slug
      uri
      status
      date
      ... on Entry_Pages_Page {
        title
        tagline
        page_description
        blocks {
          ...CtaBlock
          ...HeroSectionBlock
          ...FullImageBlock
        }
      }
    }
  }
}
